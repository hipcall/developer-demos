<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartIVR CRM Dashboard</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>SmartIVR <span>CRM</span></h1>
            </div>
            <div class="header-actions">
                <select id="langSwitcher" class="lang-select" onchange="changeLanguage()">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="nl">Nederlands</option>
                    <option value="it">Italiano</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="de">Deutsch</option>
                </select>
                <a href="logs" class="btn btn-secondary">
                    <i class="fas fa-list-ul"></i> <span data-i18n="btnLogs">Logs</span>
                </a>
                <button id="openModal" class="btn btn-primary">
                    <i class="fas fa-plus"></i> <span data-i18n="btnAddCustomer">Add Customer</span>
                </button>
            </div>
        </header>

        <main>
            <section class="stats">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-info">
                        <h3 data-i18n="totalCustomers">Total Customers</h3>
                        <p id="totalCustomers">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-route"></i>
                    <div class="stat-info">
                        <h3 data-i18n="smartRouting">Smart Routing</h3>
                        <p data-i18n="active">Active</p>
                    </div>
                </div>
            </section>

            <section class="customer-list">
                <div class="section-header">
                    <h2 data-i18n="customerDirectory">Customer Directory</h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search" data-i18n-placeholder="searchPlaceholder" placeholder="Search name or phone...">
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th data-i18n="thFullName">Full Name</th>
                                <th data-i18n="thPhone">Phone</th>
                                <th data-i18n="thEmail">Email</th>
                                <th data-i18n="thCompany">Company</th>
                                <th data-i18n="thHasDebt">Has Debt?</th>
                                <th data-i18n="thAction">Action</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="modalAddTitle">New Customer Registration</h2>
                <span class="close" id="closeAddModal">&times;</span>
            </div>
            <form id="addCustomerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name" data-i18n="labelFirstName">First Name</label>
                        <input type="text" id="first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name" data-i18n="labelLastName">Last Name</label>
                        <input type="text" id="last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone" data-i18n="labelPhone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="905xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="labelEmail">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="company_name" data-i18n="labelCompany">Company Name</label>
                    <input type="text" id="company_name">
                </div>
                <div class="form-group">
                    <label for="has_debt" data-i18n="labelHasDebt">Has Debt?</label>
                    <select id="has_debt">
                        <option value="0" data-i18n="optNo">No</option>
                        <option value="1" data-i18n="optYes">Yes</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-block" data-i18n="btnSave">Save</button>
            </form>
        </div>
    </div>

    <!-- Edit Customer Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="modalEditTitle">Edit Customer</h2>
                <span class="close" id="closeEditModal">&times;</span>
            </div>
            <form id="editCustomerForm">
                <input type="hidden" id="edit_id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit_first_name" data-i18n="labelFirstName">First Name</label>
                        <input type="text" id="edit_first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit_last_name" data-i18n="labelLastName">Last Name</label>
                        <input type="text" id="edit_last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit_phone" data-i18n="labelPhone">Phone Number</label>
                    <input type="tel" id="edit_phone" placeholder="905xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label for="edit_email" data-i18n="labelEmail">Email</label>
                    <input type="email" id="edit_email">
                </div>
                <div class="form-group">
                    <label for="edit_company_name" data-i18n="labelCompany">Company Name</label>
                    <input type="text" id="edit_company_name">
                </div>
                <div class="form-group">
                    <label for="edit_has_debt" data-i18n="labelHasDebt">Has Debt?</label>
                    <select id="edit_has_debt">
                        <option value="0" data-i18n="optNo">No</option>
                        <option value="1" data-i18n="optYes">Yes</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-block" data-i18n="btnUpdate">Update</button>
            </form>
        </div>
    </div>

    <script>
        const translations = {
            en: { btnLogs: 'Logs', btnAddCustomer: 'Add Customer', totalCustomers: 'Total Customers', smartRouting: 'Smart Routing', active: 'Active', customerDirectory: 'Customer Directory', searchPlaceholder: 'Search name or phone...', thFullName: 'Full Name', thPhone: 'Phone', thEmail: 'Email', thCompany: 'Company', thHasDebt: 'Has Debt?', thAction: 'Action', yes: 'Yes', no: 'No', modalAddTitle: 'New Customer Registration', modalEditTitle: 'Edit Customer', labelFirstName: 'First Name', labelLastName: 'Last Name', labelPhone: 'Phone Number', labelEmail: 'Email', labelCompany: 'Company Name', labelHasDebt: 'Has Debt?', optNo: 'No', optYes: 'Yes', btnSave: 'Save', btnUpdate: 'Update', confirmDelete: 'Are you sure you want to delete this customer?', errorAdd: 'Error: ' },
            tr: { btnLogs: 'Kayıtlar', btnAddCustomer: 'Müşteri Ekle', totalCustomers: 'Toplam Müşteri', smartRouting: 'Akıllı Yönlendirme', active: 'Aktif', customerDirectory: 'Müşteri Listesi', searchPlaceholder: 'Ad veya telefon ara...', thFullName: 'Ad Soyad', thPhone: 'Telefon', thEmail: 'E-posta', thCompany: 'Şirket', thHasDebt: 'Borcu Var mı?', thAction: 'İşlem', yes: 'Evet', no: 'Hayır', modalAddTitle: 'Yeni Müşteri Kaydı', modalEditTitle: 'Müşteri Düzenle', labelFirstName: 'Ad', labelLastName: 'Soyad', labelPhone: 'Telefon Numarası', labelEmail: 'E-posta', labelCompany: 'Şirket Adı', labelHasDebt: 'Borcu Var mı?', optNo: 'Hayır', optYes: 'Evet', btnSave: 'Kaydet', btnUpdate: 'Güncelle', confirmDelete: 'Bu müşteriyi silmek istediğinizden emin misiniz?', errorAdd: 'Hata: ' },
            nl: { btnLogs: 'Logboeken', btnAddCustomer: 'Klant Toevoegen', totalCustomers: 'Totaal Klanten', smartRouting: 'Slim Routeren', active: 'Actief', customerDirectory: 'Klantenlijst', searchPlaceholder: 'Zoek naam of telefoon...', thFullName: 'Naam', thPhone: 'Telefoon', thEmail: 'E-mail', thCompany: 'Bedrijf', thHasDebt: 'Schuld?', thAction: 'Actie', yes: 'Ja', no: 'Nee', modalAddTitle: 'Nieuwe Klant Registreren', modalEditTitle: 'Klant Bewerken', labelFirstName: 'Voornaam', labelLastName: 'Achternaam', labelPhone: 'Telefoonnummer', labelEmail: 'E-mail', labelCompany: 'Bedrijfsnaam', labelHasDebt: 'Schuld?', optNo: 'Nee', optYes: 'Ja', btnSave: 'Opslaan', btnUpdate: 'Bijwerken', confirmDelete: 'Weet u zeker dat u deze klant wilt verwijderen?', errorAdd: 'Fout: ' },
            it: { btnLogs: 'Registri', btnAddCustomer: 'Aggiungi Cliente', totalCustomers: 'Clienti Totali', smartRouting: 'Routing Intelligente', active: 'Attivo', customerDirectory: 'Elenco Clienti', searchPlaceholder: 'Cerca nome o telefono...', thFullName: 'Nome Completo', thPhone: 'Telefono', thEmail: 'Email', thCompany: 'Azienda', thHasDebt: 'Ha Debiti?', thAction: 'Azione', yes: 'Sì', no: 'No', modalAddTitle: 'Nuova Registrazione Cliente', modalEditTitle: 'Modifica Cliente', labelFirstName: 'Nome', labelLastName: 'Cognome', labelPhone: 'Numero di Telefono', labelEmail: 'Email', labelCompany: 'Nome Azienda', labelHasDebt: 'Ha Debiti?', optNo: 'No', optYes: 'Sì', btnSave: 'Salva', btnUpdate: 'Aggiorna', confirmDelete: 'Sei sicuro di voler eliminare questo cliente?', errorAdd: 'Errore: ' },
            fr: { btnLogs: 'Journaux', btnAddCustomer: 'Ajouter Client', totalCustomers: 'Total Clients', smartRouting: 'Routage Intelligent', active: 'Actif', customerDirectory: 'Répertoire Clients', searchPlaceholder: 'Rechercher nom ou téléphone...', thFullName: 'Nom Complet', thPhone: 'Téléphone', thEmail: 'Email', thCompany: 'Société', thHasDebt: 'A une Dette?', thAction: 'Action', yes: 'Oui', no: 'Non', modalAddTitle: 'Nouvelle Inscription Client', modalEditTitle: 'Modifier Client', labelFirstName: 'Prénom', labelLastName: 'Nom', labelPhone: 'Numéro de Téléphone', labelEmail: 'Email', labelCompany: 'Nom de la Société', labelHasDebt: 'A une Dette?', optNo: 'Non', optYes: 'Oui', btnSave: 'Enregistrer', btnUpdate: 'Mettre à Jour', confirmDelete: 'Êtes-vous sûr de vouloir supprimer ce client?', errorAdd: 'Erreur: ' },
            es: { btnLogs: 'Registros', btnAddCustomer: 'Añadir Cliente', totalCustomers: 'Total Clientes', smartRouting: 'Enrutamiento Inteligente', active: 'Activo', customerDirectory: 'Directorio de Clientes', searchPlaceholder: 'Buscar nombre o teléfono...', thFullName: 'Nombre Completo', thPhone: 'Teléfono', thEmail: 'Email', thCompany: 'Empresa', thHasDebt: '¿Tiene Deuda?', thAction: 'Acción', yes: 'Sí', no: 'No', modalAddTitle: 'Nuevo Registro de Cliente', modalEditTitle: 'Editar Cliente', labelFirstName: 'Nombre', labelLastName: 'Apellido', labelPhone: 'Número de Teléfono', labelEmail: 'Email', labelCompany: 'Nombre de Empresa', labelHasDebt: '¿Tiene Deuda?', optNo: 'No', optYes: 'Sí', btnSave: 'Guardar', btnUpdate: 'Actualizar', confirmDelete: '¿Está seguro de que desea eliminar este cliente?', errorAdd: 'Error: ' },
            de: { btnLogs: 'Protokolle', btnAddCustomer: 'Kunde Hinzufügen', totalCustomers: 'Kunden Gesamt', smartRouting: 'Intelligentes Routing', active: 'Aktiv', customerDirectory: 'Kundenverzeichnis', searchPlaceholder: 'Name oder Telefon suchen...', thFullName: 'Name', thPhone: 'Telefon', thEmail: 'E-Mail', thCompany: 'Unternehmen', thHasDebt: 'Hat Schulden?', thAction: 'Aktion', yes: 'Ja', no: 'Nein', modalAddTitle: 'Neue Kundenregistrierung', modalEditTitle: 'Kunde Bearbeiten', labelFirstName: 'Vorname', labelLastName: 'Nachname', labelPhone: 'Telefonnummer', labelEmail: 'E-Mail', labelCompany: 'Firmenname', labelHasDebt: 'Hat Schulden?', optNo: 'Nein', optYes: 'Ja', btnSave: 'Speichern', btnUpdate: 'Aktualisieren', confirmDelete: 'Möchten Sie diesen Kunden wirklich löschen?', errorAdd: 'Fehler: ' }
        };

        function t(key) {
            const lang = document.getElementById('langSwitcher').value || 'en';
            return (translations[lang] && translations[lang][key]) || translations['en'][key] || key;
        }

        function changeLanguage() {
            const lang = document.getElementById('langSwitcher').value;
            localStorage.setItem('smartivr_lang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.getAttribute('data-i18n'));
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
            });

            loadCustomers();
        }

        async function loadCustomers() {
            const response = await fetch('api/customers');
            const customers = await response.json();
            renderTable(customers);
            document.getElementById('totalCustomers').textContent = customers.length;
        }

        function renderTable(customers) {
            const tableBody = document.getElementById('customerTableBody');
            tableBody.innerHTML = '';
            customers.forEach(customer => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${customer.first_name} ${customer.last_name}</td>
                    <td>${customer.phone}</td>
                    <td>${customer.email || '-'}</td>
                    <td>${customer.company_name || '-'}</td>
                    <td>
                        ${customer.has_debt
                            ? `<span style="color:#ef4444; font-weight:600;">${t('yes')}</span>`
                            : `<span style="color:#22c55e; font-weight:600;">${t('no')}</span>`}
                    </td>
                    <td>
                        <div class="action-cell">
                            <button class="btn-edit" onclick="openEditModal(${customer.id}, '${customer.first_name}', '${customer.last_name}', '${customer.phone}', '${customer.email || ''}', '${customer.company_name || ''}', ${customer.has_debt})">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button class="btn-delete" onclick="deleteCustomer(${customer.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('smartivr_lang') || 'en';
            document.getElementById('langSwitcher').value = saved;

            const modal = document.getElementById('customerModal');
            const editModal = document.getElementById('editModal');
            const openBtn = document.getElementById('openModal');
            const closeAddBtn = document.getElementById('closeAddModal');
            const closeEditBtn = document.getElementById('closeEditModal');

            const form = document.getElementById('addCustomerForm');
            const editForm = document.getElementById('editCustomerForm');
            const tableBody = document.getElementById('customerTableBody');
            const searchInput = document.getElementById('search');

            openBtn.onclick = () => modal.style.display = 'block';
            closeAddBtn.onclick = () => modal.style.display = 'none';
            closeEditBtn.onclick = () => editModal.style.display = 'none';

            window.onclick = (event) => {
                if (event.target == modal) modal.style.display = 'none';
                if (event.target == editModal) editModal.style.display = 'none';
            };

            form.onsubmit = async (e) => {
                e.preventDefault();
                const customerData = {
                    first_name: document.getElementById('first_name').value,
                    last_name: document.getElementById('last_name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    company_name: document.getElementById('company_name').value,
                    has_debt: document.getElementById('has_debt').value
                };

                const response = await fetch('api/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customerData)
                });

                if (response.ok) {
                    form.reset();
                    modal.style.display = 'none';
                    loadCustomers();
                } else {
                    const data = await response.json();
                    alert(t('errorAdd') + data.error);
                }
            };

            window.openEditModal = (id, first_name, last_name, phone, email, company_name, has_debt) => {
                document.getElementById('edit_id').value = id;
                document.getElementById('edit_first_name').value = first_name;
                document.getElementById('edit_last_name').value = last_name;
                document.getElementById('edit_phone').value = phone;
                document.getElementById('edit_email').value = email;
                document.getElementById('edit_company_name').value = company_name;
                document.getElementById('edit_has_debt').value = has_debt;
                editModal.style.display = 'block';
            };

            editForm.onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit_id').value;
                const customerData = {
                    first_name: document.getElementById('edit_first_name').value,
                    last_name: document.getElementById('edit_last_name').value,
                    phone: document.getElementById('edit_phone').value,
                    email: document.getElementById('edit_email').value,
                    company_name: document.getElementById('edit_company_name').value,
                    has_debt: document.getElementById('edit_has_debt').value
                };

                const response = await fetch(`api/customers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customerData)
                });

                if (response.ok) {
                    editModal.style.display = 'none';
                    loadCustomers();
                } else {
                    const data = await response.json();
                    alert(t('errorAdd') + data.error);
                }
            };

            window.deleteCustomer = async (id) => {
                if (confirm(t('confirmDelete'))) {
                    await fetch(`api/customers/${id}`, { method: 'DELETE' });
                    loadCustomers();
                }
            };

            searchInput.oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const rows = tableBody.querySelectorAll('tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(term) ? '' : 'none';
                });
            };

            changeLanguage();
        });
    </script>
</body>

</html>
