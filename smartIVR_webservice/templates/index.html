<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartIVR CRM Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>SmartIVR <span>CRM</span></h1>
            </div>
            <div class="header-actions">
                <a href="/logs" class="btn btn-secondary">
                    <i class="fas fa-list-ul"></i> Logs
                </a>
                <button id="openModal" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Customer
                </button>
            </div>
        </header>

        <main>
            <section class="stats">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-info">
                        <h3>Total Customers</h3>
                        <p id="totalCustomers">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-route"></i>
                    <div class="stat-info">
                        <h3>Smart Routing</h3>
                        <p>Active</p>
                    </div>
                </div>
            </section>

            <section class="customer-list">
                <div class="section-header">
                    <h2>Customer Directory</h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search" placeholder="Search name or phone...">
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Full Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Company</th>
                                <th>Has Debt?</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Customer Registration</h2>
                <span class="close" id="closeAddModal">&times;</span>
            </div>
            <form id="addCustomerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="905xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name">
                </div>
                <div class="form-group">
                    <label for="has_debt">Has Debt?</label>
                    <select id="has_debt">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-block">Save</button>
            </form>
        </div>
    </div>

    <!-- Edit Customer Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Customer</h2>
                <span class="close" id="closeEditModal">&times;</span>
            </div>
            <form id="editCustomerForm">
                <input type="hidden" id="edit_id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit_first_name">First Name</label>
                        <input type="text" id="edit_first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit_last_name">Last Name</label>
                        <input type="text" id="edit_last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit_phone">Phone Number</label>
                    <input type="tel" id="edit_phone" placeholder="905xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label for="edit_email">Email</label>
                    <input type="email" id="edit_email">
                </div>
                <div class="form-group">
                    <label for="edit_company_name">Company Name</label>
                    <input type="text" id="edit_company_name">
                </div>
                <div class="form-group">
                    <label for="edit_has_debt">Has Debt?</label>
                    <select id="edit_has_debt">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-block">Update</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('customerModal');
            const editModal = document.getElementById('editModal');
            const openBtn = document.getElementById('openModal');
            const closeAddBtn = document.getElementById('closeAddModal');
            const closeEditBtn = document.getElementById('closeEditModal');

            const form = document.getElementById('addCustomerForm');
            const editForm = document.getElementById('editCustomerForm');
            const tableBody = document.getElementById('customerTableBody');
            const searchInput = document.getElementById('search');

            // Load customers
            const loadCustomers = async () => {
                const response = await fetch('/api/customers');
                const customers = await response.json();
                renderTable(customers);
                document.getElementById('totalCustomers').textContent = customers.length;
            };

            const renderTable = (customers) => {
                tableBody.innerHTML = '';
                customers.forEach(customer => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${customer.first_name} ${customer.last_name}</td>
                        <td>${customer.phone}</td>
                        <td>${customer.email || '-'}</td>
                        <td>${customer.company_name || '-'}</td>
                        <td>
                            ${customer.has_debt
                                ? '<span style="color:#ef4444; font-weight:600;">Yes</span>'
                                : '<span style="color:#22c55e; font-weight:600;">No</span>'}
                        </td>
                        <td>
                            <div class="action-cell">
                                <button class="btn-edit" onclick="openEditModal(${customer.id}, '${customer.first_name}', '${customer.last_name}', '${customer.phone}', '${customer.email || ''}', '${customer.company_name || ''}', ${customer.has_debt})">
                                    <i class="fas fa-pen"></i>
                                </button>
                                <button class="btn-delete" onclick="deleteCustomer(${customer.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            };

            // Add modal open/close
            openBtn.onclick = () => modal.style.display = 'block';
            closeAddBtn.onclick = () => modal.style.display = 'none';
            closeEditBtn.onclick = () => editModal.style.display = 'none';

            window.onclick = (event) => {
                if (event.target == modal) modal.style.display = 'none';
                if (event.target == editModal) editModal.style.display = 'none';
            };

            // Add customer
            form.onsubmit = async (e) => {
                e.preventDefault();
                const customerData = {
                    first_name: document.getElementById('first_name').value,
                    last_name: document.getElementById('last_name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    company_name: document.getElementById('company_name').value,
                    has_debt: document.getElementById('has_debt').value
                };

                const response = await fetch('/api/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customerData)
                });

                if (response.ok) {
                    form.reset();
                    modal.style.display = 'none';
                    loadCustomers();
                } else {
                    const data = await response.json();
                    alert('Error: ' + data.error);
                }
            };

            // Open edit modal and populate fields
            window.openEditModal = (id, first_name, last_name, phone, email, company_name, has_debt) => {
                document.getElementById('edit_id').value = id;
                document.getElementById('edit_first_name').value = first_name;
                document.getElementById('edit_last_name').value = last_name;
                document.getElementById('edit_phone').value = phone;
                document.getElementById('edit_email').value = email;
                document.getElementById('edit_company_name').value = company_name;
                document.getElementById('edit_has_debt').value = has_debt;
                editModal.style.display = 'block';
            };

            // Update customer
            editForm.onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit_id').value;
                const customerData = {
                    first_name: document.getElementById('edit_first_name').value,
                    last_name: document.getElementById('edit_last_name').value,
                    phone: document.getElementById('edit_phone').value,
                    email: document.getElementById('edit_email').value,
                    company_name: document.getElementById('edit_company_name').value,
                    has_debt: document.getElementById('edit_has_debt').value
                };

                const response = await fetch(`/api/customers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customerData)
                });

                if (response.ok) {
                    editModal.style.display = 'none';
                    loadCustomers();
                } else {
                    const data = await response.json();
                    alert('Error: ' + data.error);
                }
            };

            // Delete customer
            window.deleteCustomer = async (id) => {
                if (confirm('Are you sure you want to delete this customer?')) {
                    await fetch(`/api/customers/${id}`, { method: 'DELETE' });
                    loadCustomers();
                }
            };

            // Search filter
            searchInput.oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const rows = tableBody.querySelectorAll('tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(term) ? '' : 'none';
                });
            };

            loadCustomers();
        });
    </script>
</body>

</html>
