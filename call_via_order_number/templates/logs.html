<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite Courier | System Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-motorcycle"></i>
                <div style="display: flex; flex-direction: column;">
                    <span style="line-height: 1;">QuickBite</span>
                    <small style="font-size: 0.7rem; font-weight: 300; opacity: 0.8; margin-top: 4px;">Courier
                        Dashboard</small>
                </div>
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="/"><i class="fas fa-box"></i> Orders</a>
                    </li>
                    <li class="active">
                        <a href="/logs"><i class="fas fa-scroll"></i> Logs</a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p>Dummy App v1.0</p>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-wrapper">
                <div class="page-title">
                    <h1>System Logs</h1>
                    <p>HTTP request and response logs from Hipcall Speed Dial lookups.</p>
                </div>

                <div class="table-container" style="margin-bottom: 24px;">
                    <div class="table-header">
                        <h2>Recent Lookup Requests</h2>
                        <div class="actions">
                            <button class="btn btn-secondary" onclick="fetchLogs()">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                            <button class="btn btn-danger" onclick="clearLogs()">
                                <i class="fas fa-trash"></i> Clear Logs
                            </button>
                        </div>
                    </div>
                </div>

                <div class="log-area" id="log-area">
                </div>
            </div>
        </main>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                renderLogs(logs);
            } catch (err) {
                console.error('Failed to fetch logs:', err);
            }
        }

        async function clearLogs() {
            if (!confirm('Are you sure you want to delete all logs?')) return;
            try {
                await fetch('/api/logs', { method: 'DELETE' });
                fetchLogs();
            } catch (err) {
                console.error('Failed to clear logs:', err);
            }
        }

        function getStatusClass(code) {
            if (code >= 200 && code < 300) return 's200';
            if (code >= 400 && code < 500) return 's404';
            return 's400';
        }

        function formatJson(str) {
            try {
                if (str && str.startsWith('{')) {
                    return JSON.stringify(JSON.parse(str), null, 2);
                }
            } catch (e) { }
            return str || 'Empty';
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-area');
            container.innerHTML = '';

            if (logs.length === 0) {
                container.innerHTML = '<div class="no-data">No log records yet. Logs will appear here when Hipcall sends lookup requests.</div>';
                return;
            }

            logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div class="log-header">
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <span class="log-method">${log.method}</span>
                            <span class="log-path">${log.path}</span>
                            <span class="log-status ${getStatusClass(log.status_code)}">${log.status_code}</span>
                        </div>
                        <span class="log-time">${new Date(log.timestamp).toLocaleString('en-US')}</span>
                    </div>
                    <div class="log-bodies">
                        <div class="log-body">
                            <h4>Request</h4>
                            <pre>${formatJson(log.request_body)}</pre>
                        </div>
                        <div class="log-body">
                            <h4>Response</h4>
                            <pre>${formatJson(log.response_body)}</pre>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        fetchLogs();
        setInterval(fetchLogs, 15000);
    </script>
</body>

</html>
