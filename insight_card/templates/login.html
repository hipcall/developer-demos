<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Insight Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: var(--bg-card, white);
            border: 1px solid var(--border-color, #e2e8f0);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
        .login-header i { font-size: 2rem; color: var(--primary, #6366f1); }
        .login-header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; }
        .login-header p { margin: 0; font-size: 0.8rem; color: var(--text-muted, #94a3b8); }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.4rem; }
        .form-group input {
            width: 100%; padding: 0.6rem 0.75rem;
            border: 1px solid var(--border-color, #e2e8f0);
            border-radius: 6px; font-size: 0.95rem; font-family: inherit;
            box-sizing: border-box; transition: border-color 0.15s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary, #6366f1); }
        .btn-login {
            width: 100%; padding: 0.7rem;
            background: var(--primary, #6366f1); color: white;
            border: none; border-radius: 6px;
            font-size: 0.95rem; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: opacity 0.15s;
        }
        .btn-login:hover { opacity: 0.9; }
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            color: #dc2626; border-radius: 6px;
            padding: 0.6rem 0.75rem; font-size: 0.875rem; margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-id-card-clip"></i>
            <div>
                <h1>Insight Card</h1>
                <p>Hipcall Insight Card Demo</p>
            </div>
        </div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Sign in</button>
        </form>
    </div>
</body>
</html>
