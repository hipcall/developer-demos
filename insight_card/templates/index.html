<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipcall Insight Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .lang-select {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            width: calc(100% - 48px);
            margin: 0 24px 8px;
            display: block;
        }
        .lang-select option { background: #1e293b; color: white; }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            padding: 8px 24px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .logout-btn:hover { color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-id-card-clip"></i> Insight Card</div>
            <nav>
                <ul>
                    <li class="active" data-section="contacts">
                        <a><i class="fas fa-address-book"></i> <span data-i18n="navContacts">Contacts</span></a>
                    </li>
                    <li data-section="logs">
                        <a><i class="fas fa-list-check"></i> <span data-i18n="navLogs">Card Logs</span></a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer" style="padding-bottom: 8px;">
                <select id="langSwitcher" class="lang-select" onchange="changeLanguage()">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="nl">Nederlands</option>
                    <option value="it">Italiano</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="de">Deutsch</option>
                </select>
                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="page-title">
                    <h1 id="pageTitle" data-i18n="navContacts">Contacts</h1>
                    <p id="pageDesc" data-i18n="contactsDesc">Manage contacts for Insight Card matching</p>
                </div>
                <div style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
                    <label style="font-weight: 600; font-size: 0.85rem; white-space: nowrap;">
                        <i class="fas fa-building" style="color: var(--primary, #6366f1); margin-right: 5px;"></i>
                        <span data-i18n="activeAccount">Active Account</span>
                    </label>
                    <select id="accountSelector" onchange="saveActiveAccount()" style="padding: 7px 12px; border: 1px solid var(--border-color, #e2e8f0); border-radius: 6px; font-family: inherit; font-size: 0.85rem; min-width: 200px;">
                        <option value="" data-i18n-opt="selectAccount">— Select an account —</option>
                        {% for account in accounts %}
                        <option value="{{ account.account_id }}">{{ account.label }} ({{ account.account_id }})</option>
                        {% endfor %}
                    </select>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Contacts Section -->
                <div class="section active" id="section-contacts">
                    <div class="table-container">
                        <div class="table-header">
                            <h2 data-i18n="contactList">Contact List</h2>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label data-i18n="phone">Phone Number</label>
                                <input type="text" id="newPhone" placeholder="905xx...">
                            </div>
                            <div class="form-group">
                                <label data-i18n="fullName">Full Name</label>
                                <input type="text" id="newName">
                            </div>
                            <div class="form-group">
                                <label data-i18n="company">Company</label>
                                <input type="text" id="newCompany">
                            </div>
                            <div class="form-group">
                                <label data-i18n="balance">Balance (TL)</label>
                                <input type="text" id="newBalance" placeholder="0.00">
                            </div>
                            <button class="btn btn-primary" onclick="addContact()" style="height:42px;">
                                <i class="fas fa-plus"></i> <span data-i18n="add">Add</span>
                            </button>
                        </div>

                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th data-i18n="phone">Phone</th>
                                    <th data-i18n="fullName">Name</th>
                                    <th data-i18n="company">Company</th>
                                    <th data-i18n="balance">Balance</th>
                                    <th data-i18n="action">Action</th>
                                </tr>
                            </thead>
                            <tbody id="contactsTable"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Logs Section -->
                <div class="section" id="section-logs">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon sent"><i class="fas fa-paper-plane"></i></div>
                            <div class="stat-info">
                                <h3 data-i18n="cardsSent">Cards Sent</h3>
                                <p id="statSent">0</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon failed"><i class="fas fa-circle-exclamation"></i></div>
                            <div class="stat-info">
                                <h3 data-i18n="failed">Failed</h3>
                                <p id="statFailed">0</p>
                            </div>
                        </div>
                    </div>

                    <div class="table-container">
                        <div class="table-header">
                            <h2 data-i18n="recentCards">Recent Cards</h2>
                            <button class="btn btn-outline" onclick="fetchLogs()">
                                <i class="fas fa-arrows-rotate"></i> <span data-i18n="refresh">Refresh</span>
                            </button>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th data-i18n="callId">Call ID</th>
                                    <th data-i18n="caller">Caller</th>
                                    <th data-i18n="fullName">Name</th>
                                    <th data-i18n="company">Company</th>
                                    <th data-i18n="status">Status</th>
                                    <th data-i18n="date">Date</th>
                                </tr>
                            </thead>
                            <tbody id="logsTable">
                                <tr><td colspan="6" class="empty" data-i18n="noLogs">No card logs yet.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const translations = {
            en: {
                navContacts: 'Contacts', navLogs: 'Card Logs', logout: 'Logout',
                contactsDesc: 'Manage contacts for Insight Card matching',
                logsDesc: 'History of sent Insight Cards',
                contactList: 'Contact List', phone: 'Phone Number', fullName: 'Full Name',
                company: 'Company', balance: 'Balance (TL)', add: 'Add', action: 'Action',
                cardsSent: 'Cards Sent', failed: 'Failed', recentCards: 'Recent Cards',
                refresh: 'Refresh', callId: 'Call ID', caller: 'Caller',
                status: 'Status', date: 'Date',
                noContacts: 'No contacts yet.', noLogs: 'No card logs yet.',
                contactAdded: 'Contact added', contactDeleted: 'Contact deleted',
                errRequired: 'Fields phone, name, and company are required',
                accountSaved: 'Active account updated.', accountCleared: 'Account selection cleared.',
            },
            tr: {
                navContacts: 'Kişiler', navLogs: 'Kart Logları', logout: 'Çıkış',
                contactsDesc: 'Insight Card eşleştirmesi için kişileri yönetin',
                logsDesc: 'Gönderilen Insight Card geçmişi',
                contactList: 'Kişi Listesi', phone: 'Telefon Numarası', fullName: 'Ad Soyad',
                company: 'Firma', balance: 'Bakiye (TL)', add: 'Ekle', action: 'İşlem',
                cardsSent: 'Gönderilen Kart', failed: 'Başarısız', recentCards: 'Son Kartlar',
                refresh: 'Yenile', callId: 'Arama ID', caller: 'Arayan',
                status: 'Durum', date: 'Tarih',
                noContacts: 'Henüz kişi yok.', noLogs: 'Henüz kart logu yok.',
                contactAdded: 'Kişi eklendi', contactDeleted: 'Kişi silindi',
                errRequired: 'Telefon, isim ve firma alanları zorunludur',
                accountSaved: 'Aktif hesap güncellendi.', accountCleared: 'Hesap seçimi temizlendi.',
            },
            nl: {
                navContacts: 'Contacten', navLogs: 'Kaartlogs', logout: 'Uitloggen',
                contactsDesc: 'Beheer contacten voor Insight Card matching',
                logsDesc: 'Geschiedenis van verzonden Insight Cards',
                contactList: 'Contactenlijst', phone: 'Telefoonnummer', fullName: 'Volledige naam',
                company: 'Bedrijf', balance: 'Saldo (TL)', add: 'Toevoegen', action: 'Actie',
                cardsSent: 'Verzonden kaarten', failed: 'Mislukt', recentCards: 'Recente kaarten',
                refresh: 'Vernieuwen', callId: 'Gespreks-ID', caller: 'Beller',
                status: 'Status', date: 'Datum',
                noContacts: 'Nog geen contacten.', noLogs: 'Nog geen kaartlogs.',
                contactAdded: 'Contact toegevoegd', contactDeleted: 'Contact verwijderd',
                errRequired: 'Telefoon, naam en bedrijf zijn verplicht',
            },
            it: {
                navContacts: 'Contatti', navLogs: 'Log Schede', logout: 'Disconnetti',
                contactsDesc: 'Gestisci i contatti per la corrispondenza Insight Card',
                logsDesc: 'Cronologia delle Insight Card inviate',
                contactList: 'Lista Contatti', phone: 'Numero di Telefono', fullName: 'Nome Completo',
                company: 'Azienda', balance: 'Saldo (TL)', add: 'Aggiungi', action: 'Azione',
                cardsSent: 'Schede Inviate', failed: 'Fallito', recentCards: 'Schede Recenti',
                refresh: 'Aggiorna', callId: 'ID Chiamata', caller: 'Chiamante',
                status: 'Stato', date: 'Data',
                noContacts: 'Nessun contatto ancora.', noLogs: 'Nessun log scheda ancora.',
                contactAdded: 'Contatto aggiunto', contactDeleted: 'Contatto eliminato',
                errRequired: 'Telefono, nome e azienda sono obbligatori',
            },
            fr: {
                navContacts: 'Contacts', navLogs: 'Journaux de cartes', logout: 'Déconnexion',
                contactsDesc: 'Gérer les contacts pour la correspondance Insight Card',
                logsDesc: 'Historique des Insight Cards envoyées',
                contactList: 'Liste des contacts', phone: 'Numéro de téléphone', fullName: 'Nom complet',
                company: 'Entreprise', balance: 'Solde (TL)', add: 'Ajouter', action: 'Action',
                cardsSent: 'Cartes envoyées', failed: 'Échoué', recentCards: 'Cartes récentes',
                refresh: 'Actualiser', callId: 'ID d\'appel', caller: 'Appelant',
                status: 'Statut', date: 'Date',
                noContacts: 'Aucun contact pour l\'instant.', noLogs: 'Aucun journal de carte pour l\'instant.',
                contactAdded: 'Contact ajouté', contactDeleted: 'Contact supprimé',
                errRequired: 'Téléphone, nom et entreprise sont obligatoires',
            },
            es: {
                navContacts: 'Contactos', navLogs: 'Registros de tarjetas', logout: 'Cerrar sesión',
                contactsDesc: 'Gestionar contactos para la coincidencia de Insight Card',
                logsDesc: 'Historial de Insight Cards enviadas',
                contactList: 'Lista de contactos', phone: 'Número de teléfono', fullName: 'Nombre completo',
                company: 'Empresa', balance: 'Saldo (TL)', add: 'Agregar', action: 'Acción',
                cardsSent: 'Tarjetas enviadas', failed: 'Fallido', recentCards: 'Tarjetas recientes',
                refresh: 'Actualizar', callId: 'ID de llamada', caller: 'Llamante',
                status: 'Estado', date: 'Fecha',
                noContacts: 'Sin contactos aún.', noLogs: 'Sin registros de tarjetas aún.',
                contactAdded: 'Contacto agregado', contactDeleted: 'Contacto eliminado',
                errRequired: 'Teléfono, nombre y empresa son obligatorios',
            },
            de: {
                navContacts: 'Kontakte', navLogs: 'Kartenprotokolle', logout: 'Abmelden',
                contactsDesc: 'Kontakte für Insight Card Abgleich verwalten',
                logsDesc: 'Verlauf der gesendeten Insight Cards',
                contactList: 'Kontaktliste', phone: 'Telefonnummer', fullName: 'Vollständiger Name',
                company: 'Unternehmen', balance: 'Guthaben (TL)', add: 'Hinzufügen', action: 'Aktion',
                cardsSent: 'Gesendete Karten', failed: 'Fehlgeschlagen', recentCards: 'Letzte Karten',
                refresh: 'Aktualisieren', callId: 'Anruf-ID', caller: 'Anrufer',
                status: 'Status', date: 'Datum',
                noContacts: 'Noch keine Kontakte.', noLogs: 'Noch keine Kartenprotokolle.',
                contactAdded: 'Kontakt hinzugefügt', contactDeleted: 'Kontakt gelöscht',
                errRequired: 'Telefon, Name und Unternehmen sind erforderlich',
            }
        };

        // add i18n keys for account selector
        Object.values(translations).forEach(lang => {
            lang.activeAccount = lang.activeAccount || 'Active Account';
            lang.selectAccount = lang.selectAccount || '— Select an account —';
        });
        translations.tr.activeAccount = 'Aktif Hesap';
        translations.tr.selectAccount = '— Hesap seçin —';
        translations.nl.activeAccount = 'Actief account';
        translations.nl.selectAccount = '— Selecteer een account —';
        translations.it.activeAccount = 'Account attivo';
        translations.it.selectAccount = '— Seleziona un account —';
        translations.fr.activeAccount = 'Compte actif';
        translations.fr.selectAccount = '— Sélectionner un compte —';
        translations.es.activeAccount = 'Cuenta activa';
        translations.es.selectAccount = '— Seleccionar una cuenta —';
        translations.de.activeAccount = 'Aktives Konto';
        translations.de.selectAccount = '— Konto auswählen —';

        function t(key) {
            const lang = document.getElementById('langSwitcher').value;
            return (translations[lang] && translations[lang][key]) || translations['en'][key] || key;
        }

        function changeLanguage() {
            const lang = document.getElementById('langSwitcher').value;
            localStorage.setItem('insight_card_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
            const activeSection = document.querySelector('.sidebar nav ul li.active')?.dataset.section;
            updatePageTitle(activeSection || 'contacts');
        }

        function updatePageTitle(section) {
            const titles = {
                contacts: [t('navContacts'), t('contactsDesc')],
                logs: [t('navLogs'), t('logsDesc')]
            };
            document.getElementById('pageTitle').textContent = titles[section][0];
            document.getElementById('pageDesc').textContent = titles[section][1];
        }

        // --- Navigation ---
        document.querySelectorAll('.sidebar nav ul li').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.sidebar nav ul li').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                item.classList.add('active');
                const section = item.dataset.section;
                document.getElementById(`section-${section}`).classList.add('active');
                updatePageTitle(section);
                if (section === 'contacts') fetchContacts();
                if (section === 'logs') fetchLogs();
            });
        });

        // --- Contacts ---
        async function fetchContacts() {
            const res = await fetch('api/contacts');
            const contacts = await res.json();
            const tbody = document.getElementById('contactsTable');
            if (!contacts.length) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty">${t('noContacts')}</td></tr>`;
                return;
            }
            tbody.innerHTML = contacts.map(c => `
                <tr>
                    <td>${c.phone_number}</td>
                    <td>${c.full_name}</td>
                    <td>${c.company}</td>
                    <td class="mono">${c.balance} TL</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteContact(${c.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function addContact() {
            const phone = document.getElementById('newPhone').value.trim();
            const name = document.getElementById('newName').value.trim();
            const company = document.getElementById('newCompany').value.trim();
            const balance = document.getElementById('newBalance').value.trim() || '0.00';

            if (!phone || !name || !company) {
                showToast(t('errRequired'), 'error');
                return;
            }

            const res = await fetch('api/contacts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: phone, full_name: name, company: company, balance: balance })
            });

            if (res.ok) {
                document.getElementById('newPhone').value = '';
                document.getElementById('newName').value = '';
                document.getElementById('newCompany').value = '';
                document.getElementById('newBalance').value = '';
                showToast(t('contactAdded'), 'success');
                fetchContacts();
            } else {
                const err = await res.json();
                showToast(err.error || 'Error', 'error');
            }
        }

        async function deleteContact(id) {
            await fetch(`api/contacts/${id}`, { method: 'DELETE' });
            showToast(t('contactDeleted'), 'success');
            fetchContacts();
        }

        // --- Logs ---
        async function fetchLogs() {
            const res = await fetch('api/logs');
            const logs = await res.json();

            document.getElementById('statSent').textContent = logs.filter(l => l.status === 'sent').length;
            document.getElementById('statFailed').textContent = logs.filter(l => l.status === 'failed').length;

            const tbody = document.getElementById('logsTable');
            if (!logs.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty">${t('noLogs')}</td></tr>`;
                return;
            }
            tbody.innerHTML = logs.map(l => `
                <tr>
                    <td class="mono">${l.call_id}</td>
                    <td>${l.caller_number}</td>
                    <td>${l.contact_name}</td>
                    <td>${l.contact_company}</td>
                    <td><span class="status-tag ${l.status}">${l.status}</span></td>
                    <td>${new Date(l.created_at).toLocaleString('tr-TR')}</td>
                </tr>
            `).join('');
        }

        // --- Toast ---
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function saveActiveAccount() {
            const accountId = document.getElementById('accountSelector').value;
            await fetch('api/settings/active-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account_id: accountId })
            });
            showToast(accountId ? t('accountSaved') : t('accountCleared'), 'success');
        }

        async function loadActiveAccount() {
            const res = await fetch('api/settings/active-account');
            const data = await res.json();
            if (data.active_account) {
                document.getElementById('accountSelector').value = data.active_account;
            }
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('insight_card_lang') || 'en';
            document.getElementById('langSwitcher').value = saved;
            changeLanguage();
            loadActiveAccount();
            fetchContacts();
        });
    </script>
</body>
</html>
