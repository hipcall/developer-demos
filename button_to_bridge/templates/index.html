<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click-to-Call Customer CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-box .close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-family: inherit;
        }
        .form-actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .actions-flex {
            display: flex;
            gap: 8px;
        }
        .btn-secondary {
            background-color: var(--secondary);
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background-color: var(--secondary-hover);
        }
        .btn-danger {
            background-color: var(--danger);
            color: white;
        }
        .lang-select {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            width: calc(100% - 48px);
            margin: 0 24px 8px;
        }
        .lang-select option { background: #1e293b; color: white; }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            margin: 0 16px 4px;
            color: #94a3b8;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-headset"></i>
                <div style="display: flex; flex-direction: column;">
                    <span style="line-height: 1;">Smart CRM</span>
                    <small style="font-size: 0.7rem; font-weight: 300; opacity: 0.8; margin-top: 4px;" data-i18n="subtitle">Click-to-Call Demo</small>
                </div>
            </div>
            <nav>
                <ul>
                    <li class="active">
                        <a href="./"><i class="fas fa-address-book"></i> <span data-i18n="customers">Customers</span></a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer" style="padding-bottom: 8px;">
                <select id="langSwitcher" class="lang-select" onchange="changeLanguage()">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="nl">Nederlands</option>
                    <option value="it">Italiano</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="de">Deutsch</option>
                </select>
                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-wrapper">
                <div class="page-title">
                    <h1 data-i18n="customerList">Customer List</h1>
                    <p data-i18n="customerListDesc">Click "Call" to initiate a call via Hipcall.</p>
                </div>

                <div id="alert-container"></div>

                <div class="table-container" style="margin-bottom: 24px; padding: 16px 24px;">
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <label style="font-weight: 600; font-size: 0.9rem; white-space: nowrap;">
                            <i class="fas fa-building" style="color: var(--primary); margin-right: 6px;"></i>
                            <span data-i18n="hipcallAccount">Hipcall Account</span>
                        </label>
                        <select id="account-selector" style="flex:1; max-width:360px; padding:8px 12px; border:1px solid var(--border-color); border-radius:6px; font-family:inherit; font-size:0.9rem;">
                            <option value="" data-i18n-opt="selectAccount">— Select an account —</option>
                            {% for account in accounts %}
                            <option value="{{ account.manage_id }}">{{ account.label }} ({{ account.manage_id }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h2 data-i18n="recentCustomers">Recent Customers</h2>
                        <button class="btn btn-primary" onclick="openModal()">
                            <i class="fas fa-plus"></i> <span data-i18n="addCustomer">Add Customer</span>
                        </button>
                    </div>
                    <table class="customers-table">
                        <thead>
                            <tr>
                                <th data-i18n="name">Name</th>
                                <th data-i18n="department">Department</th>
                                <th data-i18n="phoneNumber">Phone Number</th>
                                <th data-i18n="action">Action</th>
                            </tr>
                        </thead>
                        <tbody id="customers-body">
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="customer-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close" onclick="closeModal()">&times;</button>
            <h2 id="modal-title" style="margin-bottom: 24px;"><i class="fas fa-user-plus"></i> <span data-i18n="addCustomer">Add Customer</span></h2>

            <form id="customer-form" onsubmit="submitCustomer(event)">
                <input type="hidden" id="customer_id" value="">
                <div class="form-group">
                    <label data-i18n="name">Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label data-i18n="department">Department</label>
                    <select id="department" required>
                        <option value="Support">Support</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="phoneNumber">Phone Number</label>
                    <input type="text" id="phone" required placeholder="+905XXXXXXXXX">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()" data-i18n="cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> <span data-i18n="save">Save</span></button>
                </div>
            </form>
        </div>
    </div>

    <script src="static/js/main.js"></script>
</body>

</html>
