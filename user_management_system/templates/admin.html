<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Admin Dashboard - User Management System</title>
    <link rel='stylesheet' href='static/style.css'>
</head>

<body class='admin-body'>
    <div class='container'>
        <header>
            <h1>Admin Dashboard</h1>
            <button onclick='logout()'>Logout</button>
        </header>

        <section class='actions'>
            <button onclick='showAddUserModal()'>Add User</button>
        </section>

        <section class='user-list'>
            <h2>User List</h2>
            <table id='users-table'>
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Company</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id='users-tbody'>
                </tbody>
            </table>
        </section>
    </div>

    <div id='user-modal' class='modal'>
        <div class='modal-content' style='max-height: 85vh; overflow-y: auto; padding-bottom: 40px;'>
            <span class='close' onclick='closeModal()'>&times;</span>
            <h2 id='modal-title'>Add User</h2>
            <form id='user-form'>
                <input type='hidden' id='user-id'>
                <div class='form-group'>
                    <label>First Name:</label>
                    <input type='text' id='first_name' required>
                </div>
                <div class='form-group'>
                    <label>Last Name:</label>
                    <input type='text' id='last_name' required>
                </div>
                <div class='form-group'>
                    <label>Address:</label>
                    <input type='text' id='address'>
                </div>
                <div class='form-group'>
                    <label>PIN Code:</label>
                    <input type='text' id='pin_code'>
                </div>
                <div class='form-group'>
                    <label>Phone Number:</label>
                    <input type='text' id='phone'>
                </div>
                <div class='form-group'>
                    <label>Company Name:</label>
                    <input type='text' id='company_name'>
                </div>
                <div class='form-group'>
                    <label>Company Address:</label>
                    <input type='text' id='company_address'>
                </div>
                <div class='form-group'>
                    <label>Username:</label>
                    <input type='text' id='modal_username' required>
                </div>
                <div class='form-group'>
                    <label>Password:</label>
                    <input type='text' id='modal_password' required>
                </div>
                <div style='margin-top: 30px; margin-bottom: 20px;'>
                    <button type='submit' id='submit-btn'
                        style='width: 100%; padding: 14px; font-size: 1.1rem;'>Apply</button>
                </div>
            </form>
        </div>
    </div>

    <script src='static/app.js'></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>

</html>
