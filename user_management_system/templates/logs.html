<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Sistem Logları - Global Bank</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .container {
            max-width: 1400px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="bank-header">
            <div class="logo-area">
                <span class="bank-icon">📋</span>
                <div>
                    <h1>İşlem Logları</h1>
                    <span class="subtitle">Sistem İzleme ve API Talepleri</span>
                </div>
            </div>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary">← Panele Dön</a>
                <button class="btn btn-primary" onclick="fetchLogs()">↻ Yenile</button>
                <button class="btn btn-delete" style="color: white" onclick="clearLogs()">🗑 Temizle</button>
            </div>
        </header>

        <div class="log-area" id="logArea">
            <!-- Loglar buraya gelecek -->
        </div>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                if (res.status === 401) {
                    alert("Oturum süresi dolmuş veya yetkiniz yok.");
                    return;
                }
                const logs = await res.json();
                renderLogs(logs);
            } catch (err) {
                console.error("Loglar çekilemedi:", err);
            }
        }

        async function clearLogs() {
            if (!confirm("Tüm logları silmek istediğinize emin misiniz?")) return;

            try {
                await fetch('/api/logs', { method: 'DELETE' });
                document.getElementById('logArea').innerHTML = '';
            } catch (err) {
                console.error("Loglar silinemedi:", err);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logArea');
            container.innerHTML = '';

            if (logs.length === 0) {
                container.innerHTML = '<p style="color: #64748b; text-align: center; padding: 2rem;">Henüz log kaydı bulunmuyor.</p>';
                return;
            }

            logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-item';

                let reqJson = log.request_body;
                let resJson = log.response_body;

                try {
                    if (reqJson && reqJson.startsWith('{')) {
                        reqJson = JSON.stringify(JSON.parse(reqJson), null, 2);
                    }
                } catch (e) { }

                try {
                    if (resJson && resJson.startsWith('{')) {
                        resJson = JSON.stringify(JSON.parse(resJson), null, 2);
                    }
                } catch (e) { }

                div.innerHTML = `
                    <div class="log-header">
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <span class="log-method">${log.method}</span>
                            <span class="log-path">${log.path}</span>
                        </div>
                        <span class="log-time">${new Date(log.timestamp).toLocaleString('tr-TR')}</span>
                    </div>
                    <div class="log-bodies">
                        <div class="log-body">
                            <h4>Request</h4>
                            <pre>${reqJson || 'Empty'}</pre>
                        </div>
                        <div class="log-body">
                            <h4>Response</h4>
                            <pre>${resJson || 'Empty'}</pre>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        fetchLogs();
    </script>
</body>

</html>
